<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Issue Tracker</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: #161b22;
      --border-color: #30363d;
      --text-color: #c9d1d9;
      --text-muted: #8b949e;
      --accent-blue: #58a6ff;
      --btn-hover: #21262d;
      --danger: #f85149;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: 260px;
      background-color: var(--panel-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border-color);
      color: #fff;
    }

    .nav-links {
      list-style: none;
      padding: 15px;
    }

    .nav-links li {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .nav-links li:hover, .nav-links li.active {
      background-color: var(--btn-hover);
      color: var(--text-color);
    }

    /* Main Container */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--panel-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.4rem;
      color: #fff;
    }

    .btn-primary {
      background-color: #238636;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background-color: #2ea043;
    }

    /* Content Area */
    .content {
      padding: 30px;
    }

    /* Form Section */
    .task-form {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 15px;
      align-items: end;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      border-radius: 6px;
      font-size: 0.9rem;
    }

    /* Task Table */
    .task-table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
    }

    .task-table th, .task-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    .task-table th {
      background-color: #1f242c;
      color: var(--text-muted);
      font-weight: 600;
    }

    .task-table tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-todo { background-color: #388bfd26; color: var(--accent-blue); }
    .badge-progress { background-color: #d2992226; color: #d29922; }
    .badge-done { background-color: #23863626; color: #3fb950; }

    .btn-danger {
      background: transparent;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-danger:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-header">Project Workspace</div>
    <ul class="nav-links">
      <li class="active">Overview & Tasks</li>
      <li>Assigned Issues</li>
      <li>Milestones</li>
    </ul>
  </aside>

  <!-- Main Section -->
  <main>
    <header>
      <h1>Task Manager Dashboard</h1>
    </header>

    <div class="content">
      <!-- Input Form -->
      <div class="task-form">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" id="taskTitle" placeholder="e.g., Fix login error">
        </div>
        <div class="form-group">
          <label>Assigned To</label>
          <input type="text" id="taskAssignee" placeholder="e.g., Subject 01">
        </div>
        <div class="form-group">
          <label>Deadline</label>
          <input type="date" id="taskDeadline">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="taskStatus">
            <option value="To Do">To Do</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>
        <button class="btn-primary" onclick="addTask()">Add Task</button>
      </div>

      <!-- Table -->
      <table class="task-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Assigned To</th>
            <th>Deadline</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="taskTableBody">
          <!-- Dynamically populated tasks -->
        </tbody>
      </table>
    </div>
  </main>

  <script>
    // Fetch tasks from backend API when page loads
    function loadTasks() {
      fetch('/api/tasks')
        .then(res => res.json())
        .then(data => {
          renderTasks(data.tasks);
        })
        .catch(err => console.error('Error loading tasks:', err));
    }

    // Render tasks into the HTML table
    function renderTasks(tasks) {
      const tbody = document.getElementById('taskTableBody');
      tbody.innerHTML = '';

      if (!tasks || tasks.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No tasks found.</td></tr>`;
        return;
      }

      tasks.forEach(task => {
        let badgeClass = 'badge-todo';
        if (task.status === 'In Progress') badgeClass = 'badge-progress';
        if (task.status === 'Done') badgeClass = 'badge-done';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${task.title}</td>
          <td>${task.assignedTo || 'Unassigned'}</td>
          <td>${task.deadline || 'No deadline'}</td>
          <td><span class="badge ${badgeClass}">${task.status}</span></td>
          <td><button class="btn-danger" onclick="deleteTask(${task.id})">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Add a new task via POST request
    function addTask() {
      const title = document.getElementById('taskTitle').value;
      const assignedTo = document.getElementById('taskAssignee').value;
      const deadline = document.getElementById('taskDeadline').value;
      const status = document.getElementById('taskStatus').value;

      if (!title.trim()) {
        alert('Please enter a task title.');
        return;
      }

      fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, assignedTo, deadline, status })
      })
      .then(res => res.json())
      .then(() => {
        // Clear inputs and reload table list
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskAssignee').value = '';
        document.getElementById('taskDeadline').value = '';
        loadTasks();
      })
      .catch(err => console.error('Error adding task:', err));
    }

    // Delete a task via DELETE request
    function deleteTask(id) {
      fetch(`/api/tasks?id=${id}`, {
        method: 'DELETE'
      })
      .then(res => res.json())
      .then(() => {
        loadTasks();
      })
      .catch(err => console.error('Error deleting task:', err));
    }

    // Initial load call
    loadTasks();
  </script>
</body>
</html>
